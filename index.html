<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<meta name="description" content="crss5G — Low-level Android dev // InfinityX ROM maintainer for Xiaomi Pad 5 (nabu)"/>
<meta property="og:title" content="crss5G"/>
<meta property="og:image" content="https://avatars.githubusercontent.com/hxfuxyy"/>
<meta name="theme-color" content="#000000"/>
<title>crss5G</title>
<link rel="icon" href="https://avatars.githubusercontent.com/hxfuxyy" type="image/png"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#000;--card-bg:rgba(255,255,255,0.04);--card-border:rgba(255,255,255,0.12);
  --card-border-h:rgba(255,255,255,0.22);--text:#fff;--text-muted:rgba(255,255,255,0.5);
  --text-sub:rgba(255,255,255,0.28);--btn-bg:rgba(255,255,255,0.06);
  --btn-border:rgba(255,255,255,0.15);--btn-hover-bg:rgba(255,255,255,0.11);
  --btn-hover-border:rgba(255,255,255,0.4);
  --ease-s:cubic-bezier(0.34,1.56,0.64,1);--ease-o:cubic-bezier(0.22,1,0.36,1);
}
html{scroll-behavior:smooth}
body{
  font-family:'Inter',sans-serif;background:#000;color:#fff;
  min-height:100vh;display:flex;align-items:center;justify-content:center;
  overflow-x:hidden;cursor:none;
}
@media(hover:none){body{cursor:auto}}
.cursor-dot,.cursor-ring{
  position:fixed;top:0;left:0;pointer-events:none;z-index:9999;border-radius:50%;
  transform:translate(-50%,-50%);will-change:transform;
}
.cursor-dot{width:5px;height:5px;background:#fff;box-shadow:0 0 6px rgba(255,255,255,.8)}
.cursor-ring{width:26px;height:26px;border:1px solid rgba(255,255,255,.5);opacity:.6;transition:width .18s var(--ease-o),height .18s var(--ease-o),opacity .18s ease}
body.chov .cursor-ring{width:38px;height:38px;opacity:.25}
.bg-wrap{position:fixed;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.bg-glow{position:absolute;border-radius:50%;filter:blur(120px);will-change:transform}
.bg-glow-1{width:550px;height:550px;background:rgba(0, 255, 204, 0.05);top:-180px;left:-100px;animation:g1 18s ease-in-out infinite alternate}
.bg-glow-2{width:450px;height:450px;background:rgba(255, 32, 96, 0.04);bottom:-140px;right:-80px;animation:g2 15s ease-in-out infinite alternate}
.bg-glow-3{width:400px;height:400px;background:rgba(192, 64, 255, 0.05);top:35%;left:35%;animation:g3 22s ease-in-out infinite alternate}
.bg-grid {
  position: absolute;
  inset: -100px;
  z-index: 1;
  pointer-events: none;
  background-image: 
    linear-gradient(rgba(192, 64, 255, 0.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(192, 64, 255, 0.04) 1px, transparent 1px);
  background-size: 50px 50px;
  background-position: center;
  transform: perspective(600px) rotateX(65deg) translateY(0);
  transform-origin: top;
  animation: gridScroll 8s linear infinite;
  opacity: 0.65;
}
@keyframes g1{0%{transform:translate(0,0) scale(1)}100%{transform:translate(80px,100px) scale(1.1)}}
@keyframes g2{0%{transform:translate(0,0) scale(1)}100%{transform:translate(-70px,-90px) scale(1.08)}}
@keyframes g3{0%{transform:translate(0,0) scale(1)}100%{transform:translate(60px,-60px) scale(1.15)}}
@keyframes gridScroll {
  0% { transform: perspective(600px) rotateX(65deg) translateY(0) skewX(0); filter: none; }
  23% { transform: perspective(600px) rotateX(65deg) translateY(115px) skewX(0); filter: none; }
  23.2% { transform: perspective(600px) rotateX(65deg) translateY(115px) skewX(3deg); filter: hue-rotate(90deg) contrast(1.5); }
  23.4% { transform: perspective(600px) rotateX(65deg) translateY(115px) skewX(0); filter: none; }
  58% { transform: perspective(600px) rotateX(65deg) translateY(290px) skewX(0); filter: none; }
  58.2% { transform: perspective(600px) rotateX(65deg) translateY(290px) skewX(-4deg) scaleY(1.02); filter: hue-rotate(270deg); }
  58.4% { transform: perspective(600px) rotateX(65deg) translateY(290px) skewX(0); filter: none; }
  100% { transform: perspective(600px) rotateX(65deg) translateY(500px) skewX(0); filter: none; }
}
.page{position:relative;z-index:10;width:100%;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:40px 16px}
.card{
  width:100%;max-width:420px;background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:24px;padding:44px 28px 32px;
  display:flex;flex-direction:column;align-items:center;
  backdrop-filter:blur(24px) saturate(1.2);-webkit-backdrop-filter:blur(24px) saturate(1.2);
  box-shadow:0 0 0 .5px var(--card-border),0 32px 80px rgba(0,0,0,.8),inset 0 1px 0 rgba(255,255,255,.07);
  opacity:0;transform:translateY(20px);
  animation:cIn .65s .05s var(--ease-s) forwards, cardGlitch 15s steps(1) infinite;
}
@keyframes cIn{to{opacity:1;transform:translateY(0)}}
.avatar-wrap{position:relative;width:110px;height:110px;margin-bottom:18px;flex-shrink:0}
.avatar-ring{
  position:absolute;inset:-5px;border-radius:50%;
  border:1.5px solid rgba(255,255,255,.3);
  animation:ringSpin 10s linear infinite;
  background:conic-gradient(from 0deg,transparent 0%,rgba(255,255,255,.6) 20%,transparent 40%,rgba(255,255,255,.3) 70%,transparent 90%);
  -webkit-mask:radial-gradient(farthest-side,transparent calc(100% - 2px),white calc(100% - 1px));
  mask:radial-gradient(farthest-side,transparent calc(100% - 2px),white calc(100% - 1px));
}
.avatar-ring-2{inset:-10px;opacity:.2;animation-duration:16s;animation-direction:reverse}
@keyframes ringSpin{to{transform:rotate(360deg)}}
.avatar{
  position:relative;z-index:2;width:110px;height:110px;border-radius:50%;object-fit:cover;
  display:block;border:2px solid rgba(255,255,255,.18);
  transition:transform .3s var(--ease-s),box-shadow .3s ease;
  animation:avatarGlitch 5s steps(1) infinite;
}
.avatar:hover{transform:scale(1.04);box-shadow:0 0 30px rgba(255,255,255,.15),0 0 60px rgba(255,255,255,.06)}
.name{font-size:2rem;font-weight:800;letter-spacing:-.03em;color:#fff;line-height:1;margin-bottom:12px;text-shadow:0 0 40px rgba(255,255,255,.15);animation:textGlitch 3.5s steps(1) infinite}
.badges{
  display:flex;align-items:center;gap:0;
  border:1px solid rgba(255,255,255,.14);border-radius:999px;
  padding:6px 14px;margin-bottom:14px;
  background:rgba(255,255,255,.04);backdrop-filter:blur(8px);
}
.badge{
  width:26px;height:26px;display:flex;align-items:center;justify-content:center;
  color:rgba(255,255,255,.65);border-radius:50%;cursor:default;
  transition:color .2s ease,transform .2s var(--ease-s);
}
.badge:hover{color:#fff;transform:scale(1.2)}
.bio{font-size:.78rem;font-weight:400;color:var(--text-muted);letter-spacing:.01em;line-height:1.5;text-align:center;margin-bottom:22px}
.social-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;width:100%;margin-bottom:14px}
.social-btn{
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:7px;
  padding:18px 10px;border-radius:16px;
  background:var(--btn-bg);border:1px solid var(--btn-border);
  color:rgba(255,255,255,.7);text-decoration:none;cursor:none;
  font-size:.67rem;font-weight:500;letter-spacing:.04em;
  -webkit-tap-highlight-color:transparent;
  transition:background .2s ease,border-color .2s ease,color .2s ease,transform .22s var(--ease-s),box-shadow .22s ease;
  position:relative;overflow:hidden;
  animation:btnGlitch 7s steps(1) infinite;
}
.social-grid a:nth-child(2) { animation-delay: 1.5s; }
.social-grid a:nth-child(3) { animation-delay: 3s; }
.social-btn:hover{
  background:var(--btn-hover-bg);border-color:var(--btn-hover-border);color:#fff;
  transform:translateY(-3px) scale(1.03);
  box-shadow:0 8px 28px rgba(255,255,255,.08),0 0 0 1px rgba(255,255,255,.2);
}
.social-btn:active{transform:translateY(0) scale(0.97)}
.ripple-wave{
  position:absolute;border-radius:50%;background:rgba(255,255,255,.15);
  pointer-events:none;transform:scale(0);
  animation:rip .5s var(--ease-o) forwards;
}
@keyframes rip{to{transform:scale(4.5);opacity:0}}
.gh-card {
  width:100%; border:1px solid var(--card-border); border-radius:16px;
  padding:18px 20px; margin-bottom:10px; background:rgba(255,255,255,.03);
  transition:border-color .2s ease, box-shadow .2s ease;
  display: flex; gap: 16px; align-items: stretch;
  position: relative; overflow: hidden;
  backdrop-filter: blur(12px);
  text-decoration: none; cursor: none;
}
.gh-card:hover {
  border-color: var(--card-border-h);
  box-shadow: 0 0 20px rgba(255,255,255,.05);
}
.gh-card-left {
  flex: 1.1;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
  min-width: 0;
}
.gh-card-right {
  flex: 0.9;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  min-width: 0;
  position: relative;
}
.gh-username {
  font-size: 1.05rem;
  font-weight: 700;
  color: #fff;
  display: flex;
  align-items: center;
  gap: 6px;
  margin-bottom: 12px;
}
.gh-username svg {
  color: rgba(255,255,255,0.7);
}
.gh-stat-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.gh-stat-item {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 0.72rem;
  color: var(--text-muted);
  white-space: nowrap;
}
.gh-stat-item svg {
  color: rgba(255, 255, 255, 0.4);
  flex-shrink: 0;
}
.gh-stat-val {
  font-weight: 700;
  color: #fff;
}
.gh-chart-container {
  width: 100%;
  height: 60px;
  position: relative;
}
.gh-chart-container svg {
  width: 100%;
  height: 100%;
  overflow: visible;
}
.gh-chart-path {
  stroke-dasharray: 200;
  stroke-dashoffset: 200;
  animation: drawChart 2s ease-out forwards;
}
@keyframes drawChart {
  to { stroke-dashoffset: 0; }
}
.gh-chart-label {
  font-size: 0.55rem;
  color: var(--text-sub);
  text-align: right;
  margin-top: 4px;
}
.player-card{
  width:100%;border:1px solid var(--card-border);border-radius:16px;
  padding:14px 16px;background:rgba(255,255,255,.03);
  display:flex;align-items:center;gap:12px;
  transition:border-color .2s ease;
  animation:cardGlitch 12s steps(1) infinite;
  animation-delay: 2.5s;
}
.player-card:hover{border-color:var(--card-border-h)}
.player-vol{
  flex-shrink:0;width:32px;height:32px;border-radius:8px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);
  color:rgba(255,255,255,.55);cursor:none;display:flex;align-items:center;justify-content:center;
  transition:background .2s ease,color .2s ease,transform .2s var(--ease-s);
  outline:none;-webkit-tap-highlight-color:transparent;
}
.player-vol:hover{background:rgba(255,255,255,.12);color:#fff;transform:scale(1.08)}
.player-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:6px}
.player-track{font-size:.78rem;font-weight:500;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.player-bar-wrap{display:flex;align-items:center;gap:8px}
.player-time,.player-dur{font-size:.6rem;color:var(--text-sub);font-variant-numeric:tabular-nums;flex-shrink:0;min-width:26px}
.player-dur{text-align:right}
.player-bar{flex:1;height:3px;border-radius:999px;background:rgba(255,255,255,.12);position:relative;cursor:pointer}
.player-prog{height:100%;border-radius:999px;background:#fff;width:0%;transition:width .25s linear}
.player-thumb{
  position:absolute;top:50%;width:9px;height:9px;border-radius:50%;
  background:#fff;transform:translate(-50%,-50%);left:0%;
  opacity:0;transition:opacity .2s ease,left .25s linear;
  box-shadow:0 0 6px rgba(255,255,255,.5);
}
.player-bar:hover .player-thumb{opacity:1}
.player-controls{display:flex;align-items:center;gap:4px;flex-shrink:0}
.player-btn{
  width:30px;height:30px;border-radius:8px;background:transparent;border:none;
  color:rgba(255,255,255,.5);cursor:none;display:flex;align-items:center;justify-content:center;
  transition:color .2s ease,background .2s ease,transform .2s var(--ease-s);
  outline:none;-webkit-tap-highlight-color:transparent;
}
.player-btn:hover{color:#fff;background:rgba(255,255,255,.07);transform:scale(1.1)}
.player-btn:active{transform:scale(0.92)}
.player-play{
  width:36px;height:36px;border-radius:50%;
  background:rgba(255,255,255,.1);border:1px solid rgba(255,255,255,.18);color:#fff;
}
.player-play:hover{background:rgba(255,255,255,.18);border-color:rgba(255,255,255,.4);transform:scale(1.08)}
a,button{-webkit-tap-highlight-color:transparent;-webkit-touch-callout:none;user-select:none}
@media(max-width:480px){
  .page{padding:24px 12px;align-items:flex-start;padding-top:44px}
  .card{padding:36px 18px 26px;border-radius:20px}
  .name{font-size:1.75rem}
  .social-btn{padding:15px 8px;font-size:.63rem;border-radius:13px}
  .cursor-dot,.cursor-ring{display:none}
  body{cursor:auto}
}

/* --- Breakcore Glitch Overlay Styles --- */
.glitch-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
}
.h-scanlines {
  z-index: 99;
  background: repeating-linear-gradient(
    0deg,
    transparent 0px,
    transparent 2px,
    rgba(0, 0, 0, 0.18) 2px,
    rgba(0, 0, 0, 0.18) 4px
  );
  opacity: 0.65;
}
.black-flicker {
  z-index: 100;
  background: transparent;
  animation: blackStrobe 4s steps(1) infinite;
}
.chromatic-flicker {
  z-index: 97;
  background: transparent;
  animation: chromStrobe 2.5s steps(1) infinite;
}
.sweep-line {
  left: 0;
  width: 100%;
  height: 2px;
  z-index: 96;
  background: linear-gradient(90deg, rgba(255, 255, 255, 0) 0%, rgba(255, 255, 255, 0.6) 50%, rgba(255, 255, 255, 0) 100%);
  box-shadow: 0 0 10px rgba(255, 255, 255, 0.6), 0 0 20px rgba(192, 64, 255, 0.4);
  opacity: 0;
  animation: lineSweep 5s cubic-bezier(0.2, 0.8, 0.2, 1) infinite;
}
.noise-svg {
  position: fixed;
  inset: 0;
  z-index: 95;
  width: 100%;
  height: 100%;
  pointer-events: none;
  opacity: .07;
  mix-blend-mode: overlay;
}

@keyframes blackStrobe {
  0%, 9%, 11.1%, 19.9%, 20.6%, 34.9%, 35.6%, 49.9%, 50.4%, 64.9%, 65.4%, 79.9%, 80.4%, 89.9%, 90.4%, 100% { background: transparent; }
  10% { background: rgba(0, 0, 0, 0.98); }
  20% { background: rgba(0, 0, 0, 0.96); }
  20.3% { background: rgba(0, 0, 0, 0.90); }
  35% { background: rgba(0, 0, 0, 0.97); }
  50% { background: rgba(0, 0, 0, 0.94); }
  50.2% { background: rgba(0, 0, 0, 0.97); }
  65% { background: rgba(0, 0, 0, 0.96); }
  80% { background: rgba(0, 0, 0, 0.95); }
  90% { background: rgba(0, 0, 0, 0.98); }
  90.2% { background: rgba(0, 0, 0, 0.93); }
}

@keyframes chromStrobe {
  0%, 7%, 9.1%, 22%, 24.1%, 39%, 41.1%, 57%, 59.1%, 74%, 76.1%, 89%, 91.1%, 100% { background: transparent; }
  8% { background: rgba(255, 0, 128, 0.15); }
  23% { background: rgba(0, 255, 255, 0.15); }
  40% { background: rgba(192, 64, 255, 0.18); }
  58% { background: rgba(255, 32, 96, 0.12); }
  75% { background: rgba(0, 255, 0, 0.08); }
  90% { background: rgba(255, 255, 0, 0.1); }
}

@keyframes lineSweep {
  0% { top: -2%; opacity: 0; }
  1% { opacity: 0.7; }
  8% { top: 102%; opacity: 0; }
  100% { top: 102%; opacity: 0; }
}

@keyframes cardGlitch {
  0%, 19%, 21.1%, 39%, 41.1%, 59%, 61.1%, 79%, 81.1%, 93.9%, 94.6%, 95.9%, 96.4%, 100% { transform: translate(0, 0) scale(1); filter: none; }
  20% { transform: translate(-5px, 3px) skewX(4deg); filter: hue-rotate(45deg) saturate(1.8); }
  40% { transform: translate(4px, -4px) skewY(-2deg); filter: hue-rotate(135deg) invert(0.08); }
  60% { transform: translate(-3px, -5px) scale(0.97); filter: hue-rotate(225deg) contrast(1.4); }
  80% { transform: translate(5px, 2px) skewX(-3deg); filter: hue-rotate(315deg); }
  94% { transform: translate(-6px, 4px) skewY(3deg); filter: hue-rotate(90deg) saturate(2); }
  96% { transform: translate(6px, -3px) scale(1.02); filter: hue-rotate(270deg) invert(0.1); }
}

@keyframes textGlitch {
  0%, 14%, 16.1%, 34%, 36.1%, 54%, 56.1%, 74%, 76.1%, 91.9%, 92.6%, 94.9%, 95.4%, 100% { text-shadow: 0 0 40px rgba(255,255,255,.15); }
  15% { text-shadow: -5px -2px #00ffcc, 5px 2px #ff2060, 0 0 10px #c040ff; }
  35% { text-shadow: 4px 3px #00ffcc, -4px -3px #ff2060; }
  55% { text-shadow: -3px 4px #c040ff, 3px -4px #ff2060; }
  75% { text-shadow: 5px -5px #c040ff, -5px 5px #00ffcc; }
  92% { text-shadow: -6px 0 #ff00c1, 6px 0 #00fff9; }
  95% { text-shadow: 4px -4px #00ffcc, -4px 4px #ff2060; }
}

@keyframes avatarGlitch {
  0%, 19%, 21.1%, 49%, 51.1%, 79%, 81.1%, 100% { border-color: rgba(255,255,255,.18); transform: translate(0, 0) scale(1); filter: none; }
  20% { filter: hue-rotate(180deg) saturate(2); transform: translate(-4px, 3px) scale(0.95); border-color: #00ffcc; }
  50% { filter: contrast(3) invert(0.08); transform: translate(4px, -3px) scale(1.06); border-color: #ff2060; }
  80% { filter: sepia(1) hue-rotate(90deg); transform: translate(-3px, -4px) scale(0.97); border-color: #c040ff; }
}

@keyframes btnGlitch {
  0%, 93.9%, 94.6%, 95.9%, 96.4%, 100% { transform: translate(0, 0) scale(1); filter: none; }
  94% { transform: translate(-3px, 2px) skewX(3deg); filter: hue-rotate(60deg); }
  96% { transform: translate(3px, -2px) scale(1.02); filter: hue-rotate(-60deg); }
}

@media(prefers-reduced-motion:reduce){*,*::before,*::after{animation-duration:.01ms!important;animation-iteration-count:1!important;transition-duration:.01ms!important}}
</style>
</head>
<body>

<!-- Breakcore Glitch Overlays -->
<div class="glitch-overlay black-flicker" aria-hidden="true"></div>
<div class="glitch-overlay chromatic-flicker" aria-hidden="true"></div>
<div class="glitch-overlay h-scanlines" aria-hidden="true"></div>
<div class="glitch-overlay sweep-line" aria-hidden="true"></div>
<svg class="noise-svg" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
  <filter id="noiseFilter">
    <feTurbulence type="fractalNoise" baseFrequency="0.68" numOctaves="4" stitchTiles="stitch"/>
    <feColorMatrix type="saturate" values="0"/>
  </filter>
  <rect width="100%" height="100%" filter="url(#noiseFilter)"/>
</svg>

<div class="cursor-dot" id="cursorDot"></div>
<div class="cursor-ring" id="cursorRing"></div>

<div class="bg-wrap" aria-hidden="true">
  <div class="bg-grid"></div>
  <div class="bg-glow bg-glow-1"></div>
  <div class="bg-glow bg-glow-2"></div>
  <div class="bg-glow bg-glow-3"></div>
</div>

<main class="page">
  <section class="card" id="card">

    <div class="avatar-wrap">
      <div class="avatar-ring"></div>
      <div class="avatar-ring avatar-ring-2"></div>
      <img class="avatar" id="avatar" src="https://avatars.githubusercontent.com/hxfuxyy" alt="crss5G" width="110" height="110" loading="eager"/>
    </div>

    <h1 class="name">crss5G</h1>

    <div class="badges">
      <span class="badge" title="Developer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="14" height="14"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></span>
      <span class="badge" title="ROM Maintainer"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" width="14" height="14"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12.01" y2="18"/></svg></span>

<audio id="bgAudio" loop>
  <source src="assets/music.mp3" type="audio/mpeg"/>
</audio>

<script>
(function(){
"use strict";
const $=s=>document.querySelector(s);
const $$=s=>document.querySelectorAll(s);
const cursorDot=$("#cursorDot"),cursorRing=$("#cursorRing");
const bgAudio=$("#bgAudio");
const playerPlay=$("#playerPlay"),playIcon=$("#playIcon");
const playerPrev=$("#playerPrev"),playerNext=$("#playerNext"),playerVol=$("#playerVol");
const playerBar=$("#playerBar"),playerProg=$("#playerProg"),playerThumb=$("#playerThumb");
const playerTime=$("#playerTime"),playerDur=$("#playerDur");
const volWave1=$("#volWave1"),volWave2=$("#volWave2");

/* --- Cursor --- */
let mX=window.innerWidth/2,mY=window.innerHeight/2,dX=mX,dY=mY,rX=mX,rY=mY,rafC;
function tickCursor(){
  dX+=(mX-dX)*.92;dY+=(mY-dY)*.92;rX+=(mX-rX)*.12;rY+=(mY-rY)*.12;
  if(cursorDot)cursorDot.style.transform=`translate(${dX}px,${dY}px) translate(-50%,-50%)`;
  if(cursorRing)cursorRing.style.transform=`translate(${rX}px,${rY}px) translate(-50%,-50%)`;
  rafC=requestAnimationFrame(tickCursor);
}
document.addEventListener("mousemove",e=>{mX=e.clientX;mY=e.clientY;});
document.addEventListener("mouseenter",()=>{if(cursorDot)cursorDot.style.opacity="1";if(cursorRing)cursorRing.style.opacity=".6";});
document.addEventListener("mouseleave",()=>{if(cursorDot)cursorDot.style.opacity="0";if(cursorRing)cursorRing.style.opacity="0";});
const HS="a,button,.social-btn,.player-btn,.player-vol,.avatar,.badge";
document.addEventListener("mouseover",e=>{if(e.target.closest(HS))document.body.classList.add("chov");});
document.addEventListener("mouseout",e=>{if(e.target.closest(HS))document.body.classList.remove("chov");});
if(cursorDot||cursorRing)tickCursor();
const blob1=document.querySelector(".bg-glow-1"),blob2=document.querySelector(".bg-glow-2"),blob3=document.querySelector(".bg-glow-3");
const cx=window.innerWidth/2,cy=window.innerHeight/2;let ptick=false;
window.addEventListener("mousemove",e=>{
  if(ptick)return;ptick=true;
  requestAnimationFrame(()=>{
    const dx=e.clientX-cx,dy=e.clientY-cy;
    if(blob1)blob1.style.transform=`translate(${dx*.025}px,${dy*.025}px)`;
    if(blob2)blob2.style.transform=`translate(${-dx*.02}px,${-dy*.02}px)`;
    if(blob3)blob3.style.transform=`translate(${dx*.015}px,${-dy*.015}px)`;
    ptick=false;
  });
});

/* --- Audio Player --- */
let isPlaying=false,isMuted=false;
bgAudio.volume=0.55;

function fmtTime(s){
  if(!isFinite(s))return"--:--";
  const m=Math.floor(s/60),sec=Math.floor(s%60);
  return m+":"+(sec<10?"0"+sec:sec);
}

function setPlayIcon(p){
  if(p){playIcon.innerHTML='<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';}
  else{playIcon.innerHTML='<polygon points="5 3 19 12 5 21 5 3"/>';}
}

function togglePlay(){
  if(isPlaying){bgAudio.pause();isPlaying=false;setPlayIcon(false);}
  else{bgAudio.play().then(()=>{isPlaying=true;setPlayIcon(true);}).catch(()=>{});}
}
playerPlay.addEventListener("click",togglePlay);

/* Auto-play on first interaction */
let firstInteraction=false;
function onFirstInteraction(){
  if(firstInteraction)return;
  firstInteraction=true;
  bgAudio.play().then(()=>{isPlaying=true;setPlayIcon(true);}).catch(()=>{});
  document.removeEventListener("click",onFirstInteraction);
  document.removeEventListener("keydown",onFirstInteraction);
  document.removeEventListener("touchstart",onFirstInteraction);
}
document.addEventListener("click",onFirstInteraction);
document.addEventListener("keydown",onFirstInteraction);
document.addEventListener("touchstart",onFirstInteraction);

bgAudio.addEventListener("loadedmetadata",()=>{
  playerDur.textContent=fmtTime(bgAudio.duration);
});

bgAudio.addEventListener("timeupdate",()=>{
  const pct=bgAudio.duration?bgAudio.currentTime/bgAudio.duration:0;
  const w=Math.min(pct*100,100);
  playerProg.style.width=w+"%";
  playerThumb.style.left=w+"%";
  playerTime.textContent=fmtTime(bgAudio.currentTime);
});

bgAudio.addEventListener("error",()=>{
  playerDur.textContent="n/a";
});

playerBar.addEventListener("click",e=>{
  if(!bgAudio.duration)return;
  const r=playerBar.getBoundingClientRect();
  const pct=(e.clientX-r.left)/r.width;
  bgAudio.currentTime=Math.max(0,Math.min(pct,1))*bgAudio.duration;
});

playerVol.addEventListener("click",()=>{
  isMuted=!isMuted;
  bgAudio.muted=isMuted;
  volWave1.style.opacity=isMuted?"0.2":"1";
  volWave2.style.opacity=isMuted?"0.2":"1";
});

playerPrev.addEventListener("click",()=>{bgAudio.currentTime=0;});
playerNext.addEventListener("click",()=>{bgAudio.currentTime=bgAudio.duration||0;});

/* --- Ripple --- */
$$(".social-btn").forEach(btn=>{
  btn.addEventListener("click",e=>{
    const r=btn.getBoundingClientRect();
    const rip=document.createElement("span");
    rip.classList.add("ripple-wave");
    const sz=Math.max(r.width,r.height)*1.8;
    rip.style.cssText=`position:absolute;width:${sz}px;height:${sz}px;left:${e.clientX-r.left-sz/2}px;top:${e.clientY-r.top-sz/2}px`;
    btn.appendChild(rip);
    rip.addEventListener("animationend",()=>rip.remove());
  });
});

/* --- GitHub Stats --- */
function animCount(el,target,dur){
  if(!el)return;
  const t0=performance.now();
  (function step(now){
    const p=Math.min((now-t0)/dur,1);
    const e=1-Math.pow(1-p,3);
    const v=Math.round(target*e);
    el.textContent=v>=1000?(v/1000).toFixed(1)+"k":String(v);
    if(p<1)requestAnimationFrame(step);
  })(t0);
}
async function loadGH(){
  try{
    const ur=await fetch(`https://api.github.com/users/hxfuxyy`);
    if(!ur.ok)throw new Error();
    const u=await ur.json();
    animCount(statRepos,u.public_repos,900);
    animCount(statContrib,60,1100);
  }catch(_){
    if(statRepos)statRepos.textContent="4";
    if(statContrib)statContrib.textContent="60";
  }
}
const statRepos=$("#statRepos"),statContrib=$("#statContrib");
loadGH();

if("ontouchstart" in window){
  if(cursorDot)cursorDot.style.display="none";
  if(cursorRing)cursorRing.style.display="none";
  cancelAnimationFrame(rafC);
}
})();
</script>
